<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapping Config Groups</title>
    <style>
        :root {
            --bg: #f6f8ed;
            --ink: #1f2a44;
            --surface: #ffffff;
            --accent: #006d5b;
            --accent-soft: #e0f3ef;
            --danger: #a6142b;
            --border: #d5ddcf;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 15%, #d9f0e8 0, transparent 35%),
                radial-gradient(circle at 85% 5%, #ffe8c7 0, transparent 35%),
                var(--bg);
            min-height: 100vh;
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 28px 16px 48px;
        }

        h1 {
            margin: 0;
            letter-spacing: 0.03em;
        }

        .subtitle {
            margin-top: 8px;
            opacity: 0.85;
        }

        .toolbar {
            margin: 18px 0 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            padding: 9px 14px;
            border-radius: 9px;
            cursor: pointer;
            font-weight: 600;
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .status {
            margin: 8px 0 14px;
            min-height: 22px;
            font-size: 0.95rem;
        }

        .status.error {
            color: var(--danger);
            font-weight: 700;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 8px 18px rgba(21, 30, 20, 0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: rise 280ms ease;
        }

        .badge {
            display: inline-block;
            width: fit-content;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 4px 9px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .meta {
            font-size: 0.95rem;
        }

        .card a {
            text-decoration: none;
            color: #fff;
            background: var(--accent);
            width: fit-content;
            padding: 8px 12px;
            border-radius: 9px;
            font-weight: 700;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="page">
    <h1>Mapping Config Groups</h1>
    <p class="subtitle">Mappings grouped by configGroupNumber</p>

    <div class="toolbar">
        <button class="primary" id="refreshBtn">Refresh</button>
    </div>

    <div class="status" id="status"></div>
    <section class="cards" id="groups"></section>
</div>

<script>
    const statusEl = document.getElementById("status");
    const groupsEl = document.getElementById("groups");
    const refreshBtn = document.getElementById("refreshBtn");

    function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.className = isError ? "status error" : "status";
    }

    function renderGroups(groups) {
        groupsEl.innerHTML = "";
        if (!groups.length) {
            setStatus("No mapping groups found.");
            return;
        }

        setStatus(`Found ${groups.length} groups.`);
        groups.forEach(group => {
            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `
                <span class="badge">Group ${group.configGroupNumber}</span>
                <div class="meta">Mappings: <strong>${group.mappingCount}</strong></div>
                <a href="/mapping-config-group-details.html?group=${group.configGroupNumber}">Open details page</a>
            `;
            groupsEl.appendChild(card);
        });
    }

    async function loadGroups() {
        setStatus("Loading groups...");
        try {
            const res = await fetch("/api/mapping-configs/groups");
            if (!res.ok) {
                throw new Error(`Request failed with status ${res.status}`);
            }
            const groups = await res.json();
            renderGroups(groups);
        } catch (error) {
            setStatus(error.message || "Failed to load groups", true);
        }
    }

    refreshBtn.addEventListener("click", loadGroups);
    loadGroups();
</script>
</body>
</html>
