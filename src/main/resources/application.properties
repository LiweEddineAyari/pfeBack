openai.api-key=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
openai.chat-model=gpt-4o-mini
