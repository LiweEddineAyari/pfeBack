# =============================================================================
# Banking ETL DataMart - Phase 1: Extraction
# Application Configuration
# =============================================================================

spring.application.name=postgres

# =============================================================================
# Database Configuration (PostgreSQL)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Initialize schema.sql before Hibernate
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false

# =============================================================================
# JPA / Hibernate Configuration
# =============================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Create staging schema automatically
spring.jpa.properties.jakarta.persistence.schema-generation.create-database-schemas=true
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# =============================================================================
# ETL Configuration
# =============================================================================

# Processing Configuration
etl.chunk-size=100

# =============================================================================
# Logging Configuration
# =============================================================================
logging.level.root=INFO
logging.level.projet.app=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Log file configuration
logging.file.name=./logs/banking-etl.log
logging.file.max-size=10MB
logging.file.max-history=30

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# Server Configuration
# =============================================================================
server.port=8081

# File upload settings (max 500MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB

# =============================================================================
# Actuator Configuration (for monitoring)
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
