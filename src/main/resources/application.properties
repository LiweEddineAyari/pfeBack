# Backend self-loopback (the AI module calls our own REST endpoints).
backend.base-url=http://localhost:${server.port}

# Conversation memory tuning.
ai.memory.max-messages-window=20
ai.memory.summarize-every-n-turns=10

# Tool orchestration limits.
ai.orchestrator.max-tool-calls-per-turn=8
ai.orchestrator.tool-timeout-seconds=10

# RAG (retrieval-augmented generation) tuning.
ai.rag.top-k=8
ai.rag.min-score=0.70
ai.rag.rrf-k=60
ai.rag.semantic-weight=0.5
ai.rag.fts-weight=0.3
ai.rag.exact-weight=0.2
ai.rag.embedding-dimension=1536

# Title generation.
ai.title-generation.enabled=true
ai.title-generation.async=true

# Rate limiting (per X-User-Id, in-memory sliding window).
ai.rate-limit.requests-per-minute=60

# Async executor for title generation / background summarization.
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.thread-name-prefix=ai-async-
